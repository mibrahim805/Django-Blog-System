{% extends "base.html" %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Interests</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        h2, p {
            text-align: center;
        }

        .interest-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .interest-card {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .interest-card input {
            display: none;
        }

        .interest-card:has(input:checked) {
            background: black;
            color: white;
            border-color: black;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: black;
            color: white;
            cursor: pointer;
        }

        .add-btn {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            border-radius: 20px;
            border: 2px dashed #aaa;
            background: transparent;
            cursor: pointer;
        }

        .custom-input {
            margin-top: 10px;
            display: none;
        }

        .custom-input input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>What are your interests?</h2>
    <p>Select your interesting feed</p>

    <form method="POST">
        {% csrf_token %}

        <!-- Interests -->
        <div class="interest-grid">
            {% for field in form %}
                {% for checkbox in field %}
                    <label class="interest-card">
                        {{ checkbox.tag }}
                        <span>{{ checkbox.choice_label }}</span>
                    </label>
                {% endfor %}
            {% endfor %}
        </div>

        <!-- Add Custom -->
{#        <button type="button" class="add-btn" onclick="toggleInput()">#}
{#            + Add your own interest#}
{#        </button>#}
{##}
{#        <div class="custom-input" id="customInput">#}
{#            <input type="text" name="custom_interest" placeholder="Type your interest...">#}
{#        </div>#}

        <br>

        <button type="submit" class="btn">Continue</button>
    </form>
</div>

{#        const el = document.getElementById("customInput");#}
{#        el.style.display = (el.style.display === "block") ? "none" : "block";#}
{#    }#}
{#</script>#}

</body>
</html>
{% endblock %}
