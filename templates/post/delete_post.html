{% block content %}

<h2 class="mb-4">Delete Post</h2>

<p>Are you sure you want to delete "<strong>{{ post.title }}</strong>"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="{% url 'blog:my_posts' %}" class="btn btn-secondary">Cancel</a>
</form>

{% endblock %}
