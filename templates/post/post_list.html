<h1>All Posts</h1>

{% for post in posts %}
  <div style="border:1px solid #ccc; padding:10px; margin-bottom:10px;">

    <h2>
      <a href="{% url 'post_detail' post.id %}">
        {{ post.title }}
      </a>
    </h2>

    <p>By {{ post.author.username }} | {{ post.created_at }}</p>

    <p>
      {{ post.content|truncatewords:20 }}
    </p>

    <a href="{% url 'post_detail' post.id %}">
      Read More
    </a>

  </div>
{% empty %}
  <p>No posts available.</p>
{% endfor %}
