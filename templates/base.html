<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<title>{% block title %}Blog System{% endblock %}</title>

	<!-- Bootstrap CSS -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

	<!-- Google Fonts -->
	<link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;500;600;700&display=swap" rel="stylesheet">

	<style>
		:root {
			--primary-color: #667eea;
			--secondary-color: #764ba2;
			--light-bg: #f8f9fa;
			--card-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
			--hover-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
		}

		* {
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
		}

		html, body {
			height: 100%;
		}

		body {
			background-color: var(--light-bg);
			color: #2d3748;
		}

		main {
			min-height: calc(100vh - 80px);
			padding: 30px 0;
		}

		/* Live Notifications Styling */
		#live-notifications {
			position: fixed;
			right: 20px;
			bottom: 20px;
			max-width: 380px;
			z-index: 9999;
		}

		#live-notifications > div {
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			color: white;
			padding: 14px 18px;
			margin-top: 10px;
			border-radius: 10px;
			box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
			font-weight: 500;
			font-size: 14px;
			line-height: 1.5;
			animation: slideInRight 0.3s ease-out;
			word-wrap: break-word;
			word-break: break-word;
		}

		@keyframes slideInRight {
			from {
				transform: translateX(400px);
				opacity: 0;
			}
			to {
				transform: translateX(0);
				opacity: 1;
			}
		}

		/* Footer Styling */
		footer {
			background: white;
			border-top: 1px solid #e2e8f0;
			padding: 30px 0;
			margin-top: 60px;
			box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.04);
		}

		footer p {
			margin: 0;
			color: #718096;
			font-size: 14px;
		}

		/* Global back button (shown under navbar) */
		.global-back-wrap {
			max-width: 1140px;
			margin: 14px auto 0;
			padding: 0 12px;
		}

		.global-back-btn {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			padding: 8px 12px;
			border-radius: 10px;
			border: 1px solid #dbe2ef;
			background: #ffffff;
			color: #374151;
			font-weight: 600;
			font-size: 13px;
			line-height: 1;
			cursor: pointer;
			transition: all 0.2s ease;
		}

		.global-back-btn:hover {
			border-color: var(--primary-color);
			color: var(--primary-color);
			box-shadow: 0 4px 14px rgba(102, 126, 234, 0.14);
		}

		.global-back-btn[hidden] {
			display: none;
		}

		/* Scroll bar styling */
		::-webkit-scrollbar {
			width: 8px;
			height: 8px;
		}

		::-webkit-scrollbar-track {
			background: #f1f1f1;
		}

		::-webkit-scrollbar-thumb {
			background: var(--primary-color);
			border-radius: 4px;
		}

		::-webkit-scrollbar-thumb:hover {
			background: var(--secondary-color);
		}

		/* Responsive adjustments */
		@media (max-width: 768px) {
			main {
				padding: 20px 0;
			}

			.quick-actions {
				padding-top: 10px;
			}

			.logout-chip {
				width: 100%;
				justify-content: center;
			}

			#live-notifications {
				max-width: 90vw;
				right: 10px;
				left: 10px;
			}

			#live-notifications > div {
				padding: 12px 14px;
				font-size: 13px;
				margin-top: 8px;
			}

			.global-back-wrap {
				margin-top: 10px;
				padding: 0 10px;
			}
		}
	</style>

	{% block extra_css %}{% endblock %}
</head>
<body data-authenticated="{{ request.user.is_authenticated|yesno:'1,0' }}">

	<!-- Navigation Bar -->
	{% include "includes/navbar.html" %}

	<div class="global-back-wrap">
		<button id="global-back-btn" class="global-back-btn" type="button" aria-label="Go back" hidden>
			<span aria-hidden="true">&larr;</span>
			<span>Back</span>
		</button>
	</div>


	<!-- Main Content -->
	<main>
		{% block content %}{% endblock %}
	</main>

	<!-- Live Notifications Container -->
	<div id="live-notifications"></div>

	<!-- Footer -->
	<footer>
		<div class="container">
			<div class="row">
				<div class="col-md-6">
					<p><strong>Blog System</strong> © 2026. All rights reserved.</p>
				</div>
				<div class="col-md-6 text-md-end">
					<p>Made with ❤️ for sharing great ideas</p>
				</div>
			</div>
		</div>
	</footer>

	<!-- Bootstrap JS -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

	<!-- Notifications Script -->
	<script>
		document.addEventListener("DOMContentLoaded", function () {
			const backBtn = document.getElementById("global-back-btn");
			if (backBtn) {
				const hasReferrer = document.referrer && document.referrer !== window.location.href;
				if (window.history.length > 1 || hasReferrer) {
					backBtn.hidden = false;
					backBtn.addEventListener("click", function () {
						window.history.back();
					});
				}
			}

			const isAuthenticated = document.body.dataset.authenticated === "1";
			if (!isAuthenticated) return;

			const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
			const countEl = document.getElementById("notif-count");

			function syncUnreadCount() {
				fetch("/notifications/unread-count/")
					.then(function (response) { return response.json(); })
					.then(function (data) {
						if (countEl && typeof data.unread_count === "number") {
							countEl.textContent = String(data.unread_count);
						}
					})
					.catch(function () {});
			}

			function showToast(message) {
				const box = document.getElementById("live-notifications");
				if (!box || !message) return;
				const item = document.createElement("div");
				item.textContent = message;
				box.prepend(item);
				setTimeout(function () { item.remove(); }, 5000);
			}

			function connectSocket() {
				const socket = new WebSocket(wsScheme + "://" + window.location.host + "/ws/notifications/");

				socket.onmessage = function (event) {
					const data = JSON.parse(event.data);
					if (countEl) {
						const current = parseInt(countEl.textContent || "0", 10);
						countEl.textContent = String(current + 1);
					}
					showToast(data.message);
				};

				socket.onclose = function () {
					setTimeout(connectSocket, 2000);
				};
			}

			connectSocket();
			syncUnreadCount();
			setInterval(syncUnreadCount, 20000);
		});
	</script>

	{% block extra_js %}{% endblock %}

</body>
</html>
