{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<style>
    :root {
        --primary-color: #667eea;
        --secondary-color: #764ba2;
        --light-bg: #f8f9fa;
        --card-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        --hover-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    body {
        background-color: var(--light-bg);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
    }

    .container-center {
        max-width: 600px;
        width: 100%;
        padding: 20px;
    }

    .card {
        border: none;
        border-radius: 12px;
        box-shadow: var(--hover-shadow);
    }

    .card-header {
        background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
        color: white;
        border: none;
        border-radius: 12px 12px 0 0;
        padding: 24px;
    }

    .card-header h2 {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
    }

    .card-body {
        padding: 24px;
    }

    .parent-comment {
        background-color: #f7fafc;
        padding: 14px 16px;
        border-radius: 8px;
        border-left: 3px solid var(--primary-color);
        margin-bottom: 20px;
    }

    .parent-comment-author {
        font-weight: 600;
        color: #2d3748;
        font-size: 13px;
        margin-bottom: 6px;
    }

    .parent-comment-text {
        color: #4a5568;
        font-size: 13px;
        line-height: 1.5;
    }

    .form-label {
        font-weight: 600;
        color: #2d3748;
        margin-bottom: 8px;
    }

    .form-control {
        border-radius: 8px;
        border: 1px solid #e2e8f0;
        padding: 10px 14px;
        font-size: 14px;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }

    .char-count {
        font-size: 12px;
        color: #718096;
        margin-top: 4px;
    }

    .btn-container {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        margin-top: 24px;
    }

    .btn-action {
        padding: 10px 24px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-cancel {
        background-color: #e2e8f0;
        color: #4a5568;
    }

    .btn-cancel:hover {
        background-color: #cbd5e0;
    }

    .btn-submit {
        background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
        color: white;
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .post-info {
        background-color: #eef2ff;
        border-left: 3px solid var(--primary-color);
        padding: 12px 14px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 13px;
        color: #4338ca;
    }

    .post-info-title {
        font-weight: 600;
        margin-bottom: 4px;
    }

    @media (max-width: 600px) {
        .btn-container {
            flex-direction: column-reverse;
        }

        .btn-action {
            width: 100%;
        }

        .card-header h2 {
            font-size: 20px;
        }
    }
</style>

<div class="container-center">
    <div class="card">
        <div class="card-header">
            <h2>💬 Reply to Comment</h2>
        </div>
        <div class="card-body">
            <div class="post-info">
                <div class="post-info-title">Post: {{ comment.post.title }}</div>
            </div>

            <div class="parent-comment">
                <div class="parent-comment-author">{{ comment.user.username }}'s Comment</div>
                <div class="parent-comment-text">{{ comment.content }}</div>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Your Reply</label>
                    <textarea class="form-control" name="content" rows="4" placeholder="Write your reply..." required></textarea>
                    <div class="char-count"><span id="charCount">0</span> characters</div>
                </div>

                <div class="btn-container">
                    <a href="{% url 'blog:home' %}" class="btn-action btn-cancel">Cancel</a>
                    <button type="submit" class="btn-action btn-submit">Post Reply</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Character counter
    const textarea = document.querySelector('textarea[name="content"]');
    const charCount = document.getElementById('charCount');

    textarea.addEventListener('input', function() {
        charCount.textContent = this.value.length;
    });
</script>
{% endblock %}
