{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<style>
    :root {
        --primary-color: #667eea;
        --secondary-color: #764ba2;
        --border-color: #e2e8f0;
        --text-primary: #1a202c;
        --text-secondary: #718096;
    }

    .reply-container {
        max-width: 700px;
        margin: 32px auto;
        padding: 0 16px;
    }

    .reply-card {
        background: white;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        box-shadow: 0 4px 16px rgba(15, 23, 42, 0.08);
        overflow: hidden;
    }

    .reply-header {
        background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
        color: white;
        padding: 24px;
    }

    .reply-header h2 {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .reply-body {
        padding: 28px;
    }

    .post-context {
        background: #f0f4ff;
        border-left: 3px solid var(--primary-color);
        padding: 14px 16px;
        border-radius: 8px;
        margin-bottom: 20px;
    }

    .post-context-label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        color: #4338ca;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
    }

    .post-context-title {
        font-size: 15px;
        font-weight: 600;
        color: #1f2937;
    }

    .parent-comment-block {
        background: #f8fafc;
        border: 1px solid var(--border-color);
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 24px;
    }

    .comment-author-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
    }

    .comment-author-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 14px;
    }

    .comment-author-name {
        font-weight: 600;
        color: var(--text-primary);
        font-size: 14px;
    }

    .comment-text {
        color: #4a5568;
        font-size: 14px;
        line-height: 1.6;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-label {
        display: block;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 8px;
        font-size: 14px;
    }

    .form-control {
        width: 100%;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        padding: 12px 14px;
        font-size: 14px;
        font-family: inherit;
        transition: all 0.2s ease;
    }

    .form-control:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        outline: none;
    }

    .char-count {
        font-size: 12px;
        color: var(--text-secondary);
        margin-top: 6px;
    }

    .actions {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
    }

    .btn-action {
        padding: 12px 24px;
        border-radius: 8px;
        border: none;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s ease;
        text-decoration: none;
        display: inline-block;
    }

    .btn-submit {
        background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
        color: white;
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-cancel {
        background: #e2e8f0;
        color: var(--text-primary);
    }

    .btn-cancel:hover {
        background: #cbd5e0;
    }

    @media (max-width: 640px) {
        .reply-container {
            margin: 20px auto;
        }

        .reply-body {
            padding: 20px;
        }

        .reply-header h2 {
            font-size: 20px;
        }

        .actions {
            flex-direction: column-reverse;
        }

        .btn-action {
            width: 100%;
        }
    }
</style>

<div class="reply-container">
    <div class="reply-card">
        <div class="reply-header">
            <h2><i class="fas fa-reply"></i> Reply to Comment</h2>
        </div>
        <div class="reply-body">
            <!-- Post Context -->
            <div class="post-context">
                <div class="post-context-label">In reply to post:</div>
                <div class="post-context-title">{{ comment.post.title }}</div>
            </div>

            <!-- Parent Comment Block -->
            <div class="parent-comment-block">
                <div class="comment-author-badge">
                    <div class="comment-author-avatar">{{ comment.user.username|first|upper }}</div>
                    <div class="comment-author-name">{{ comment.user.get_full_name|default:comment.user.username }}</div>
                </div>
                <p class="comment-text">{{ comment.content }}</p>
            </div>

            <!-- Reply Form -->
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label">Your Reply</label>
                    <textarea
                        class="form-control"
                        name="content"
                        rows="4"
                        placeholder="Write a thoughtful reply..."
                        required
                        id="reply-textarea"
                    ></textarea>
                    <div class="char-count"><span id="charCount">0</span>/500 characters</div>
                </div>

                <div class="actions">
                    <a href="{% url 'blog:home' %}" class="btn-action btn-cancel">
                        <i class="fas fa-times"></i> Cancel
                    </a>
                    <button type="submit" class="btn-action btn-submit">
                        <i class="fas fa-paper-plane"></i> Post Reply
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const textarea = document.getElementById('reply-textarea');
    const charCount = document.getElementById('charCount');

    textarea.addEventListener('input', function() {
        const count = Math.min(this.value.length, 500);
        charCount.textContent = count;
        if (count >= 500) {
            this.style.borderColor = '#f56565';
        } else {
            this.style.borderColor = 'var(--border-color)';
        }
    });

    // Auto-focus
    textarea.focus();
</script>
{% endblock %}
